<meta name="description" content="Francisco Aleuy — IT & Operations professional and Singer/Performer. Based in Southern Okanagan, BC, Canada.">

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f172a;color:#f8fafc;font-family:Inter,sans-serif;overflow-x:hidden}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem}
h1{color:#f8fafc}a{text-decoration:none}
.name{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;letter-spacing:-.02em;text-align:center;margin-bottom:.3rem}
.sub{font-size:.83rem;color:#64748b;text-align:center;letter-spacing:.08em;margin-bottom:3rem}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;width:100%;max-width:640px}
@media(max-width:500px){.cards{grid-template-columns:1fr;max-width:340px}}
.card{position:relative;padding:1.8rem 1.5rem 1.5rem;border-radius:16px;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;gap:.4rem;overflow:hidden}
.card:hover{transform:translateY(-4px)}
.card-it{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.22)}
.card-it:hover{border-color:rgba(56,189,248,.5);box-shadow:0 8px 40px rgba(56,189,248,.12)}
.card-art{background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.22)}
.card-art:hover{border-color:rgba(167,139,250,.5);box-shadow:0 8px 40px rgba(167,139,250,.12)}
.card-icon{font-size:1.5rem;margin-bottom:.15rem}
.card-title{font-size:1.05rem;font-weight:700;color:#f8fafc;line-height:1.3}
.card-tags{font-size:.72rem;color:#64748b;line-height:1.7}
.card-cta{margin-top:auto;padding-top:1rem;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.3rem}
.card-it .card-cta{color:#38bdf8}.card-art .card-cta{color:#a78bfa}
.card-badge{position:absolute;top:.7rem;right:.75rem;font-size:.6rem;font-weight:700;letter-spacing:.12em;padding:.15rem .5rem;border-radius:20px;text-transform:uppercase}
.card-it .card-badge{background:rgba(56,189,248,.1);color:#38bdf8;border:1px solid rgba(56,189,248,.2)}
.card-art .card-badge{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}
.loc{margin-top:2.5rem;font-size:.74rem;color:#334155;text-align:center;letter-spacing:.05em}
</style>
<script>(function(){
  var s=localStorage.getItem('fa-lang');
  var b=(navigator.language||'en').substring(0,2).toLowerCase();
  var l=s||b;
  if(l==='es'){localStorage.setItem('fa-lang','es');window.location.replace('/es/');}
  else if(l==='fr'){localStorage.setItem('fa-lang','fr');window.location.replace('/fr/');}
})();</script>
</head><body>

</div>

<p class="loc">franciscoaleuy.ca &nbsp;·&nbsp; <a href="/es/" style="color:#475569;transition:color .2s" onMouseOver="this.style.color='#94a3b8'" onMouseOut="this.style.color='#475569'" onclick="localStorage.setItem('fa-lang','es')">ES</a> &nbsp;·&nbsp; <a href="/fr/" style="color:#475569;transition:color .2s" onMouseOver="this.style.color='#94a3b8'" onMouseOut="this.style.color='#475569'" onclick="localStorage.setItem('fa-lang','fr')">FR</a></p>

</body></html>
